name: Build iTip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release
        run: |
          xcodebuild -project iTip.xcodeproj \
            -scheme iTip \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-"

      - name: Package app
        run: |
          cd build/Build/Products/Release
          codesign --force --deep --sign - iTip.app
          xattr -cr iTip.app
          ditto -c -k --sequesterRsrc --keepParent iTip.app iTip.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iTip-release
          path: build/Build/Products/Release/iTip.zip

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Generate version tag from short SHA + date
          VERSION="v1.0.0-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          # Delete existing release with same tag if any
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true

          # Create release with the zip
          gh release create "$VERSION" \
            build/Build/Products/Release/iTip.zip \
            --title "iTip $VERSION" \
            --notes "Build from \`${GITHUB_SHA::7}\`: $COMMIT_MSG" \
            --latest
