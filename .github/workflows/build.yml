name: Build iTip

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Release
        run: |
          xcodebuild -project iTip.xcodeproj \
            -scheme iTip \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-"

      - name: Package app
        run: |
          cd build/Build/Products/Release
          codesign --force --deep --sign - iTip.app
          zip -r iTip.zip iTip.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iTip-release
          path: build/Build/Products/Release/iTip.zip
